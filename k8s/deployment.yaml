apiVersion: apps/v1
kind: Deployment
metadata:
  name: "epamdemoagentcloud"
  namespace: "agents-devteam"
  labels:
    app: "epamdemoagentcloud"
    team: "devteam"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "epamdemoagentcloud"
  template:
    metadata:
      labels:
        app: "epamdemoagentcloud"
        team: "devteam"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-epamdemoagentcloud"
      containers:
        - name: "epamdemoagentcloud"
          image: "acrshoppoc.azurecr.io/agents/epamdemoagentcloud:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-epamdemoagentcloud"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
